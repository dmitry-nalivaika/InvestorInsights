# ============================================================
# InvestorInsights — Local Development Docker Compose
# Services: PostgreSQL, Redis, Qdrant, Azurite (Blob Storage emulator)
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml down
# ============================================================

services:
  # ── PostgreSQL 16 ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: investorinsights-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-company_analysis}
      POSTGRES_USER: ${DB_USER:-analyst}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-analyst_password}
    ports:
      - "${DB_EXTERNAL_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-analyst} -d ${DB_NAME:-company_analysis}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis 7 ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: investorinsights-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Qdrant Vector Database ───────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.7
    container_name: investorinsights-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_EXTERNAL_HTTP_PORT:-6333}:6333"
      - "${QDRANT_EXTERNAL_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Azurite (Azure Blob Storage Emulator) ────────────────────
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: investorinsights-azurite
    restart: unless-stopped
    command: azurite-blob --blobHost 0.0.0.0 --blobPort 10000 --loose --skipApiVersionCheck
    ports:
      - "10000:10000"
    volumes:
      - azurite_data:/data
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "10000"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local
  azurite_data:
    driver: local
