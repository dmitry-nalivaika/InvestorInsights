# filepath: /Users/Dmitry_Nalivaika/Documents/Projects/InvestorInsights/backend/alembic.ini
# Alembic Configuration File
#
# The sqlalchemy.url is overridden at runtime by alembic/env.py
# using the application Settings.sync_database_url property.

[alembic]
script_location = alembic
prepend_sys_path = .

# Use the application's naming convention
# (defined in app.models.base.Base.metadata)

# Template for migration file names
file_template = %%(rev)s_%%(slug)s

# Timezone for revision timestamps
timezone = UTC

# Output encoding
output_encoding = utf-8

# sqlalchemy.url placeholder — overridden by env.py
sqlalchemy.url = postgresql://analyst:analyst_password@localhost:5432/company_analysis

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
